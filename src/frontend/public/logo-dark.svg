<svg width="720" height="200" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Brighter curve gradient for dark mode -->
    <linearGradient id="gradientCurveDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"></stop>
      <stop offset="50%" stop-color="#3B82F6"></stop>
      <stop offset="100%" stop-color="#60A5FA"></stop>
    </linearGradient>

    <!-- Subtle luminous fill -->
    <linearGradient id="gradientFillDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.02"></stop>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .model-curve {
        fill: none;
        stroke: url(#gradientCurveDark);
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#softGlow);
      }

      .model-area {
        fill: url(#gradientFillDark);
      }

      .data-point {
        fill: #93C5FD;
        filter: url(#softGlow);
      }

      .brand-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 500;
        font-size: 46px;
        letter-spacing: 1.5px;
        fill: #F1F5F9;
      }
    </style>
  </defs>

  <!-- Data points -->
  <circle class="data-point" cx="60" cy="120" r="4"></circle>
  <circle class="data-point" cx="120" cy="80" r="4"></circle>
  <circle class="data-point" cx="180" cy="150" r="4"></circle>
  <circle class="data-point" cx="240" cy="100" r="4"></circle>
  <circle class="data-point" cx="300" cy="130" r="4"></circle>
  <circle class="data-point" cx="360" cy="90" r="4"></circle>
  <circle class="data-point" cx="420" cy="120" r="4"></circle>
  <circle class="data-point" cx="480" cy="80" r="4"></circle>
  <circle class="data-point" cx="540" cy="140" r="4"></circle>
  <circle class="data-point" cx="600" cy="100" r="4"></circle>

  <!-- Area under curve -->
  <path class="model-area" d="
    M 50 140
    C 120 80, 240 160, 360 90
    C 480 40, 600 140, 670 100
    L 670 180
    L 50 180
    Z
  "></path>

  <!-- Curve -->
  <path class="model-curve" d="M 50 140
           C 120 80, 240 160, 360 90
           C 480 40, 600 140, 670 100"></path>

  <!-- Brand name -->
  <text class="brand-text" x="50" y="195">SurroMod</text>

</svg>